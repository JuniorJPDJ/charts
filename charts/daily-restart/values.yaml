#
# IMPORTANT NOTE
#
# This chart inherits from our common library chart. You can check the default values/options here:
# https://github.com/bjw-s/helm-charts/blob/main/charts/library/common/values.yaml
#

controllers:
  daily-restart:
    type: cronjob
    primary: false
    cronjob:
      # restart schedule
      schedule: "0 4 * * *"
    serviceAccount:
      identifier: daily-restart
    pod:
      automountServiceAccountToken: true
    containers:
      main:
        command:
          - ash
          - '-c'
          - >
            nses="$(kubectl get deployment,statefulset,daemonset -A -l juniorjpdj.pl/daily-restart=enabled -o=json | jq '[.items[].metadata.namespace] | unique | .[]' -r)" ;
            for ns in $nses ; do
              echo "processing '$ns' namespace" ;
              kubectl rollout restart deployment,statefulset,daemonset -l juniorjpdj.pl/daily-restart=enabled -n $ns --field-manager='daily-restart' ;
            done
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
        image:
          repository: ghcr.io/juniorjpdj/containers/openssl-kubectl
          tag: 1.34.2-r14@sha256:fa78052ee70bd0cc0a53f1129a02b671815ca88e6848b862ad4338380d500302
          pullPolicy: Always

serviceAccount:
  daily-restart: {}

rbac:
  roles:
    daily-restart:
      type: ClusterRole
      rules:
        - apiGroups:
            - apps
            - extensions
          resources:
            - deployments
            - daemonsets
            - statefulsets
          verbs:
            - list
            - get
            - patch
  bindings:
    daily-restart:
      type: ClusterRoleBinding
      roleRef:
        identifier: daily-restart
      subjects:
        - identifier: daily-restart
